version: "3.9"

services:
  epoch-zero:
    build: .
    ports:
      - "8051:8051"
    environment:
      - PORT=8051
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8051/')"]
      interval: 30s
      timeout: 10s
      retries: 3
